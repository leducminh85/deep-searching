# fly.toml app configuration file generated for deep-searching-backend on 2024-03-16

app = "deep-searching-backend"
primary_region = "hkg" # Hong Kong is usually good for Vietnam users

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
