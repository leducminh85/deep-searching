services:
  # PostgreSQL - Local video database
  postgres:
    image: postgres:16-alpine
    container_name: deep-searching-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deep_searching
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js App
  nextjs:
    build:
      context: ./nextjs-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: deep-searching
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Supabase (Auth, History, Channel Sources)
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Leducminh123}
      # Local PostgreSQL (Video Data)
      LOCAL_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/deep_searching
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./nextjs-app/data:/app/data

  # Cloudflare Tunnel - Expose local app to the internet
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: deep-searching-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nextjs
      
  pgadmin:
    image: dpage/pgadmin4
    container_name: deep-searching-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
